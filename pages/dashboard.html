<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
    max-width: 600px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.top {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

.add {
    padding: 10px 15px;
    border: none;
    background: #667eea;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.add:hover {
    background: #5a67d8;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f5f5f5;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 10px;
}

.task-text {
    flex: 1;
}

.done {
    text-decoration: line-through;
    color: gray;
}

.actions button {
    margin-left: 5px;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
}

.complete {
    background: #48bb78;
    color: white;
}

.delete {
    background: #e53e3e;
    color: white;
}

.logout {
    margin-top: 20px;
    width: 100%;
    padding: 10px;
    border: none;
    background: black;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>To-Do Dashboard</h2>

    <div class="top">
        <input id="task" placeholder="Add a new task...">
        <button class="add" onclick="addTask()">Add</button>
    </div>

    <ul id="list"></ul>

    <button class="logout" onclick="logout()">Logout</button>
</div>

<script src="../js/dashboard.js"></script>

</body>
</html>
